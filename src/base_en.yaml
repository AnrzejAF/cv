    design:
    locale:
    typst_path: ../cv_files/NAME_IN_SNAKE_CASE_CV_en.typ
    pdf_path: ../cv_files/NAME_IN_SNAKE_CASE_CV_en.pdf
    markdown_path: ../cv_files/NAME_IN_SNAKE_CASE_CV_en.md
    html_path: ../cv_files/NAME_IN_SNAKE_CASE_CV_en.html
    png_path: ../cv_files/NAME_IN_SNAKE_CASE_CV_en.png
    dont_generate_pdf: false
    dont_generate_markdown: true
    dont_generate_html: true
    dont_generate_typst: false
    dont_generate_png: true
  bold_keywords: []
