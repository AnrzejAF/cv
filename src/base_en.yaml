      - institution: Gdańsk University of Technology
        area: Automation and Robotics
        faculty: Faculty of Electrical and Control Engineering
        degree: Eng.
        start_date: 2018
        end_date: 2022
        location: Gdańsk
        summary: |-
          Profile: **Automation and Robotics**
        highlights:
